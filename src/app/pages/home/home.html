<app-navbar></app-navbar>
 
<div class="container">

  <!-- 🔍 Buscador -->
  <app-search-bar (searchChange)="onSearchChange($event)"></app-search-bar>

  <!-- 🎯 Filtros -->
  <app-filters (filterChange)="onFilterChange($event)"></app-filters>

  <div class="main-content">

    <!-- 🗺️ MAPA -->
    <div class="map-container">
      <app-map
        [filter]="selectedTag"
        [search]="searchTerm">
      </app-map>
    </div>

    <!-- 📦 PANEL -->
    <div class="panel-container">
      <app-place-panel></app-place-panel>
    </div>

  </div>

</div>

<app-footer></app-footer>
